version: '3.9'

services:
  web:
    build: .
    container_name: django_app
    working_dir: /app
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: biz_tech_postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8000:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: